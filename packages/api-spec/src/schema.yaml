openapi: '3.1.1'
info:
  title: ASSETTY API
  version: '1.0'
servers:
  - url: http://localhost:8787/api
paths:
  /auth/login:
    post:
      summary: ログイン
      requestBody:
        $ref: '#/components/requestBodies/LoginRequestBody'
      responses:
        '200':
          description: ログイン成功
          headers:
            Set-Cookie:
              schema:
                type: string
              description: アクセストークン（JWT）を HttpOnly Cookie にセット
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginSuccessResponse'
              examples:
                success:
                  summary: 成功レスポンス例
                  value:
                    name: Lillie
        '401':
          description: ログイン失敗（ユーザーが存在しないか、パスワードが正しくない）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                unauthorized:
                  summary: ログイン失敗レスポンス例
                  value:
                    code: INVALID_CREDENTIALS
                    message: Invalid Credentials
  /auth/logout:
    post:
      summary: ログアウト
      responses:
        '204':
          description: ログアウト成功
          headers:
            Set-Cookie:
              schema:
                type: string
              description: アクセストークン（JWT）を Cookie から削除
  /auth/check:
    get:
      summary: 認可チェック
      security:
        - JwtAuthInCookie: []
      responses:
        '200':
          description: 認可成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthCheckResponse'
              examples:
                success:
                  summary: 成功レスポンス例
                  value:
                    ok: true
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /user:
    get:
      summary: ユーザー情報取得
      security:
        - JwtAuthInCookie: []
      responses:
        '200':
          description: ユーザー情報取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfoResponse'
              examples:
                success:
                  summary: 成功レスポンス例
                  value:
                    id: tfi4wB9ZRyhzVE7EhIyht
                    name: Lillie
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /assets/monthly:
    get:
      summary: 月次の資産情報取得
      security:
        - JwtAuthInCookie: []
      parameters:
        - $ref: '#/components/parameters/BaseDateParameter'
      responses:
        '200':
          description: 月次の資産情報取得成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AssetsInfoResponse'
              examples:
                success:
                  summary: 成功レスポンス例
                  value:
                    - yearMonth: '2025-01'
                      totalAssets: 8919403
                      assetsByCategories:
                        - category: 現金
                          amount: 2014567
                          rate: 22.6
                        - category: 債券
                          amount: 1898234
                          rate: 21.3
                        - category: 国内株式
                          amount: 1928456
                          rate: 21.6
                        - category: 投資信託
                          amount: 1105234
                          rate: 12.4
                        - category: REIT
                          amount: 1214789
                          rate: 13.6
                        - category: 年金
                          amount: 758123
                          rate: 8.5
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /assets/yearly:
    get:
      summary: 年次の資産情報取得
      security:
        - JwtAuthInCookie: []
      parameters:
        - $ref: '#/components/parameters/BaseDateParameter'
      responses:
        '200':
          description: 年次の資産情報取得成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AssetsInfoResponse'
              examples:
                success:
                  summary: 成功レスポンス例
                  value:
                    - yearMonth: '2025-12'
                      totalAssets: 10945737
                      assetsByCategories:
                        - category: 現金
                          amount: 2538234
                          rate: 23.2
                        - category: 債券
                          amount: 2312567
                          rate: 21.1
                        - category: 国内株式
                          amount: 2408345
                          rate: 22
                        - category: 投資信託
                          amount: 1328234
                          rate: 12.1
                        - category: REIT
                          amount: 1458234
                          rate: 13.3
                        - category: 年金
                          amount: 900123
                          rate: 8.2
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /assets:
    post:
      summary: 月次の資産データ登録
      security:
        - JwtAuthInCookie: []
      requestBody:
        $ref: '#/components/requestBodies/CreateAssetsRequestBody'
      responses:
        '201':
          description: 資産データ登録成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAssetsSuccessResponse'
              examples:
                success:
                  summary: 成功レスポンス例
                  value:
                    ok: true
        '500':
          description: 資産データ登録失敗
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                assets_registration_failed:
                  summary: 資産データ登録失敗レスポンス例
                  value:
                    code: ASSETS_REGISTRATION_FAILED
                    message: Assets Registration Failed
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /assets/categories:
    get:
      summary: 資産カテゴリの取得
      security:
        - JwtAuthInCookie: []
      responses:
        '200':
          description: 資産カテゴリの取得成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AssetsCategory'
              examples:
                success:
                  summary: 成功レスポンス例
                  value:
                    - id: 1
                      name: 現金
                    - id: 2
                      name: 債券
        '401':
          $ref: '#/components/responses/UnauthorizedError'

components:
  requestBodies:
    LoginRequestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            description: /login のリクエストボディ
            properties:
              name:
                type: string
                description: ユーザー名
              password:
                type: string
                description: パスワード
            required:
              - name
              - password
          examples:
            login:
              summary: ログインリクエスト例
              value:
                name: Lillie
                password: Lillie1101
    CreateAssetsRequestBody:
      required: true
      content:
        application/json:
          schema:
            type: array
            description: 月次の資産データ登録のリクエストボディ
            items:
              type: object
              properties:
                date:
                  type: string
                  format: date
                  description: 基準日（YYYY-MM-DD形式）
                amount:
                  type: number
                  description: 資産額
                assetCategoryId:
                  type: number
                  description: 資産カテゴリID
              required:
                - date
                - amount
                - assetCategoryId
          examples:
            create:
              summary: 資産データ登録リクエスト例
              value:
                - date: "2025-12-01"
                  amount: 2538234
                  assetCategoryId: 1
                - date: "2025-12-01"
                  amount: 2312567
                  assetCategoryId: 2
  parameters:
    BaseDateParameter:
      name: baseDate
      in: query
      description: 基準日（YYYY-MM-DD形式）
      required: true
      schema:
        type: string
        format: date
      examples:
        baseDate:
          summary: 基準日例
          value: "2025-12-01"
  responses:
    UnauthorizedError:
      description: 認可チェック失敗
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            unauthorized:
              summary: 認可失敗レスポンス例
              value:
                code: INVALID_ACCESS_TOKEN
                message: Invalid Access Token
  schemas:
    ErrorResponse:
      type: object
      description: 共通のエラーレスポンス
      properties:
        code:
          type: string
          description: エラーコード
          enum:
            - INVALID_CREDENTIALS
            - INVALID_ACCESS_TOKEN
            - INVALID_RESPONSE_DATA
            - NOT_FOUND
            - ASSETS_REGISTRATION_FAILED
            - INTERNAL_SERVER_ERROR
        message:
          type: string
          description: エラーメッセージ
          enum:
            - Invalid Credentials
            - Invalid Access Token
            - Invalid Response Data
            - Not Found
            - Assets Registration Failed
            - Internal Server Error
      required:
        - code
        - message
    LoginSuccessResponse:
      type: object
      description: ログイン成功時のレスポンス
      properties:
        name:
          type: string
          description: ユーザー名
      required:
        - name
    AuthCheckResponse:
      type: object
      description: 認可成功時のレスポンス
      properties:
        ok:
          type: boolean
          description: 認可成功を表す真偽値
          enum:
            - true
      required:
        - ok
    CreateAssetsSuccessResponse:
      type: object
      description: 資産データ登録成功時のレスポンス
      properties:
        ok:
          type: boolean
          description: 資産データ登録の成功を表す真偽値
          enum:
            - true
      required:
        - ok
    UserInfoResponse:
      type: object
      description: ユーザー情報取得レスポンス
      properties:
        id:
          type: string
          description: ユーザーID
        name:
          type: string
          description: ユーザー名
      required:
        - id
        - name
    AssetsCategory:
      type: object
      description: 資産カテゴリ
      properties:
        id:
          type: number
          description: 資産カテゴリID
        name:
          type: string
          description: 資産カテゴリ名
      required:
        - id
        - name
    AssetsAllocation:
      type: object
      description: 資産内訳
      properties:
        category:
          type: string
          description: 資産カテゴリ名
        amount:
          type: number
          description: カテゴリーの資産額
        rate:
          type: number
          description: 全体に占める割合（%）
      required:
        - category
        - amount
        - rate
    AssetsInfoResponse:
      type: object
      description: 資産情報レスポンス
      properties:
        yearMonth:
          type: string
          description: 年月（YYYY-MM形式）
        totalAssets:
          type: number
          description: その年月の合計資産額
        assetsByCategories:
          type: array
          description: カテゴリー別の資産情報
          items:
            $ref: '#/components/schemas/AssetsAllocation'
      required:
        - yearMonth
        - totalAssets
        - assetsByCategories
  securitySchemes:
    JwtAuthInCookie:
      type: apiKey
      in: cookie
      name: access_token
      description: 認可用JWT。ログイン成功時に発行され、以降のリクエストではHttpOnly属性のCookie（access_token）として自動送信される。
