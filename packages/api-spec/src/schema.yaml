openapi: '3.1.1'
info:
  title: ASSETTY API
  version: '1.0'
servers:
  - url: http://localhost:8787/api
paths:
  /auth/login:
    post:
      summary: ログイン
      requestBody:
        $ref: '#/components/requestBodies/LoginRequestBody'
      responses:
        '200':
          description: ログイン成功
          headers:
            Set-Cookie:
              schema:
                type: string
              description: アクセストークン（JWT）を HttpOnly Cookie にセット
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginSuccessResponse'
              examples:
                success:
                  summary: 成功レスポンス例
                  value:
                    name: Lillie
        '401':
          description: ログイン失敗（ユーザーが存在しないか、パスワードが正しくない）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                unauthorized:
                  summary: ログイン失敗レスポンス例
                  value:
                    code: INVALID_CREDENTIALS
                    message: Invalid Credentials
  /auth/logout:
    post:
      summary: ログアウト
      responses:
        '204':
          description: ログアウト成功
          headers:
            Set-Cookie:
              schema:
                type: string
              description: アクセストークン（JWT）を Cookie から削除
  /auth/check:
    get:
      summary: 認可チェック
      security:
        - JwtAuthInCookie: []
      responses:
        '200':
          description: 認可成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthCheckResponse'
              examples:
                success:
                  summary: 成功レスポンス例
                  value:
                    ok: true
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /message:
    get:
      summary: メッセージ（Assetty）取得
      security:
        - JwtAuthInCookie: []
      responses:
        '200':
          description: メッセージ取得成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: メッセージ
                    enum:
                      - Assetty
                required:
                  - message
              examples:
                success:
                  summary: 成功レスポンス例
                  value:
                    message: 'Assetty'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

components:
  requestBodies:
    LoginRequestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            description: /login のリクエストボディ
            properties:
              name:
                type: string
                description: ユーザー名
              password:
                type: string
                description: パスワード
            required:
              - name
              - password
          examples:
            login:
              summary: ログインリクエスト例
              value:
                name: Lillie
                password: Lillie1101
  responses:
    UnauthorizedError:
      description: 認可チェック失敗
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            unauthorized:
              summary: 認可失敗レスポンス例
              value:
                code: INVALID_ACCESS_TOKEN
                message: Invalid Access Token
  schemas:
    ErrorResponse:
      type: object
      description: 共通のエラーレスポンス
      properties:
        code:
          type: string
          description: エラーコード
          enum:
            - INVALID_CREDENTIALS
            - INVALID_ACCESS_TOKEN
            - INVALID_RESPONSE_DATA
            - NOT_FOUND
            - INTERNAL_SERVER_ERROR
        message:
          type: string
          description: エラーメッセージ
          enum:
            - Invalid Credentials
            - Invalid Access Token
            - Invalid Response Data
            - Not Found
            - Internal Server Error
      required:
        - code
        - message
    LoginSuccessResponse:
      type: object
      description: ログイン成功時のレスポンス
      properties:
        name:
          type: string
          description: ユーザー名
      required:
        - name
    AuthCheckResponse:
      type: object
      description: 認可成功時のレスポンス
      properties:
        ok:
          type: boolean
          description: 認可成功を表す真偽値
          enum:
            - true
      required:
        - ok
  securitySchemes:
    JwtAuthInCookie:
      type: apiKey
      in: cookie
      name: access_token
      description: 認可用JWT。ログイン成功時に発行され、以降のリクエストではHttpOnly属性のCookie（access_token）として自動送信される。
